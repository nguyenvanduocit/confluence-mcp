version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: confluence-mcp
    main: .
    binary: confluence-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: confluence-cli
    main: ./cmd/confluence-cli
    binary: confluence-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: confluence-mcp
    ids:
      - confluence-mcp
    name_template: "confluence-mcp_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

  - id: confluence-cli
    ids:
      - confluence-cli
    name_template: "confluence-cli_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

brews:
  - name: confluence-mcp
    ids:
      - confluence-mcp
    repository:
      owner: nguyenvanduocit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/nguyenvanduocit/confluence-mcp"
    description: "confluence-mcp - MCP server"
    install: |
      bin.install "confluence-mcp"

  - name: confluence-cli
    ids:
      - confluence-cli
    repository:
      owner: nguyenvanduocit
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/nguyenvanduocit/confluence-mcp"
    description: "confluence-cli - CLI tool"
    install: |
      bin.install "confluence-cli"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
